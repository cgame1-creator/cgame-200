<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成語特工：航太終端</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --cyan: #00f2ff; --purple: #bc13fe; --orange: #ff9d00; --gold: #ffd700; --red: #ff3131; --green: #39ff14; --bg: #020508; }
        body { background-color: var(--bg); color: #fff; font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; background: radial-gradient(circle at center, #0a192f 0%, #020508 100%); }
        
        .hud-border { 
            width: 96vw; height: 96vh; border: 2px solid rgba(0, 242, 255, 0.3); border-radius: 30px; 
            position: relative; display: flex; flex-direction: column; align-items: center; padding: 30px; box-sizing: border-box; 
            background: rgba(10, 25, 47, 0.4); backdrop-filter: blur(8px);
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8);
        }

        .hud-border::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border: 3px solid var(--cyan); border-radius: 30px; pointer-events: none;
            clip-path: polygon(0 0, 15% 0, 15% 2%, 2% 2%, 2% 15%, 0 15%, 0 0, 85% 0, 85% 2%, 98% 2%, 98% 15%, 100% 15%, 100% 0, 100% 85%, 98% 85%, 98% 98%, 85% 98%, 85% 100%, 100% 100%, 0 100%, 0 85%, 2% 85%, 2% 98%, 15% 98%, 15% 100%, 0 100%);
        }

        .main-title { font-size: 70px; font-weight: 900; color: #fff; text-shadow: 0 0 20px var(--cyan); margin: 10px 0; font-style: italic; letter-spacing: 8px; }

        .level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; width: 85%; margin-top: 30px; }
        .level-btn { 
            background: linear-gradient(145deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0.08) 100%);
            border: 3px solid #fff; border-radius: 20px; height: 180px; display: flex; align-items: center; 
            padding-left: 40px; cursor: pointer; transition: 0.3s; position: relative;
        }
        .level-btn:hover { transform: translateY(-8px); background: rgba(255,255,255,0.12); box-shadow: 0 0 40px currentColor; }
        
        .lv-svg { width: 80px; height: 80px; margin-right: 35px; stroke: currentColor; fill: none; filter: drop-shadow(0 0 10px currentColor); stroke-width: 1.5; }
        .lv-tag { font-size: 48px; font-weight: 900; letter-spacing: 2px; }

        .btn-l1 { border-color: var(--cyan); color: var(--cyan); }
        .btn-l2 { border-color: var(--purple); color: var(--purple); }
        .btn-l3 { border-color: var(--orange); color: var(--orange); }
        .btn-l4 { border-color: var(--gold); color: var(--gold); }

        .timer-big { font-size: 130px; font-weight: 900; color: var(--cyan); text-shadow: 0 0 30px var(--cyan); }
        .timer-urgent { color: var(--red) !important; animation: shake 0.2s infinite; }
        
        .q-text { font-size: 55px; font-weight: bold; margin: 30px 0; text-align: center; }
        
        .opt-btn { width: 85%; padding: 22px; margin-bottom: 15px; font-size: 45px; border-radius: 15px; border: 3px solid var(--cyan); background: rgba(0, 242, 255, 0.05); color: #fff; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .opt-correct { background: var(--green) !important; color: #000; border-color: var(--green) !important; box-shadow: 0 0 60px var(--green); }
        .opt-wrong { background: var(--red) !important; color: #fff; border-color: var(--red) !important; animation: shake 0.4s; }

        .expl-panel { width: 90%; font-size: 38px; padding: 25px 40px; border-radius: 20px; margin-top: 15px; border: 4px solid; line-height: 1.5; background: rgba(0,0,0,0.8); }
        .expl-ok { border-color: var(--green); color: var(--green); }
        .expl-fail { border-color: var(--red); color: var(--red); }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-20px); } 40%, 80% { transform: translateX(20px); } }
        .score-hero { font-size: 250px; color: var(--gold); font-weight: 900; text-shadow: 0 0 80px var(--gold); }
    </style>
</head>
<body>
    <div class="hud-border" id="app"></div>

<script>
    // --- 音效引擎 ---
    let audioCtx;
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function synth(freq, type, duration, vol, delay = 0) {
        if (!audioCtx) return;
        setTimeout(() => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }, delay);
    }
    const SFX = {
        ding: () => { synth(1100, 'sine', 0.2, 0.3); synth(1400, 'sine', 0.2, 0.3, 70); synth(1700, 'sine', 0.3, 0.3, 140); },
        fail: () => { synth(230, 'sawtooth', 0.6, 0.4); synth(170, 'sawtooth', 0.8, 0.4, 250); },
        win: () => { [523, 659, 783, 1046, 1318, 1567].forEach((f, i) => synth(f, 'sine', 0.8, 0.1, i * 150)); }
    };

    // --- 嚴格分級題庫 ---
    const quizData = {
        1: [ // 執行特工
            ["三顧茅廬","誠心拜訪人才。","隨便觀察應付。","劉備三次拜訪諸葛亮，形容求才誠意。"],
            ["半途而廢","中途停止努力。","堅持做到最後。","事情做一半就停止，形容意志不堅。"],
            ["司空見慣","事物平凡常見。","想法奇怪離譜。","比喻事物經常見到，不足為奇。"],
            ["完璧歸趙","物歸原主完好。","偷偷佔為己有。","藺相如將和氏璧完好帶回趙國。"],
            ["手足之情","兄弟感情深厚。","路人偶然相遇。","比喻兄弟或好朋友之間親密的感情。"],
            ["磨杵成針","努力必能成功。","做事拔苗助長。","只要努力不懈，連鐵棒都能磨成針。"],
            ["精疲力竭","耗盡體力疲累。","精神飽滿振奮。","精神與體力都消耗殆盡。"],
            ["滄海桑田","世事變化極大。","一直維持原狀。","大海變成了農田，形容世事變化極大。"],
            ["東施效顰","胡亂模仿出醜。","表現青出於藍。","醜女模仿美女皺眉，反而更醜。"],
            ["披荊斬棘","勇敢克服困難。","害怕畏縮不前。","撥開荊棘前進，比喻克服困難。"]
        ],
        2: [ // 資深特派
            ["韜光養晦","收斂才華待機。","張揚顯露實力。","收斂光芒，不輕易顯露才華。"],
            ["危如累卵","情況極度危險。","非常安全穩定。","危險得像堆疊起來的蛋，隨時會碎。"],
            ["推心置腹","真心待人誠懇。","內心各懷鬼胎。","把心放在別人腹中，形容極為真誠。"],
            ["博學多聞","學識廣博豐富。","孤陋寡聞淺薄。","廣泛學習並聽取各種知識。"],
            ["空中樓閣","脫離現實幻想。","做事腳踏實地。","在空中蓋樓，比喻脫離現實的幻想。"],
            ["對牛彈琴","對不懂者講理。","引導學生學習。","比喻對不講理或不懂的人白費唇舌。"],
            ["心領神會","內心明白默契。","完全莫名其妙。","不必明說，心裡就能明白對方意思。"],
            ["絕處逢生","死裡逃生轉機。","完全走投無路。","在走投無路時，又發現了生機。"],
            ["侃侃而談","說話理直氣壯。","講話語無倫次。","理直氣壯、從容不迫地談話。"],
            ["矯枉過正","糾正過度有害。","處理恰到好處。","糾正錯誤超過了限度，反而不對。"]
        ],
        3: [ // 王牌特攻
            ["邯鄲學步","模仿他人失自我。","表現優秀勝老師。","燕國人學走路，最後爬著回家。"],
            ["破釜沉舟","決心戰鬥不後退。","做事苟且偷安。","打碎鍋子、鑿沉船隻，表示必死決心。"],
            ["未雨綢繆","事先準備預防。","臨渴才要掘井。","天還沒下雨就先修房子，比喻先預防。"],
            ["洛陽紙貴","著作廣受歡迎。","書籍無人問津。","形容著作風行一時，使紙張變貴。"],
            ["魚游釜中","生命極度危險。","處理游刃有餘。","魚在鍋子裡游，比喻生命危在旦夕。"],
            ["斬釘截鐵","做事果斷利落。","態度猶豫不決。","比喻態度堅決，毫不猶豫。"],
            ["草木皆兵","受驚驚恐萬分。","內心泰然自若。","把草木都看成士兵，形容極度驚恐。"],
            ["捉襟見肘","生活極度窮困。","衣食無憂富裕。","拉下衣襟就露出胳膊，形容窮於應付。"],
            ["畫蛇添足","多此一舉失敗。","做得錦上添花。","畫蛇時幫牠畫腳，形容多此一舉。"],
            ["視若無睹","看見卻不理會。","認真觀察色彩。","雖然常看到，卻像沒看到一樣。"]
        ],
        4: [ // 特級首席
            ["越俎代庖","超越權限管事。","守好自己本分。","放下祭器去幫廚師做飯，形容管閒事。"],
            ["罄竹難書","罪大惡極難盡。","功德無量巨大。","用盡所有竹簡也寫不完其罪狀。"],
            ["禍起蕭牆","禍亂生自內部。","一致對抗外敵。","蕭牆是屏風，比喻內部發生變亂。"],
            ["井底之蛙","見識非常淺薄。","見多識廣博大。","青蛙住在井底，比喻眼界狹小。"],
            ["腹笥淵博","學問極度深厚。","胸無點墨無知。","形容肚子像書箱一樣裝滿了書。"],
            ["削足適履","因小失大遷就。","量體裁衣合適。","削掉腳趾去穿鞋，比喻勉強遷就。"],
            ["揠苗助長","勉強反而有害。","遵循自然生長。","拔高禾苗幫它生長，反而讓它枯死。"],
            ["驚弓之鳥","受過驚嚇敏感。","處變不驚冷靜。","被箭射傷過的鳥，聽到弓弦聲就害怕。"],
            ["燕雀處堂","處險境而不覺。","安穩高枕無憂。","燕子在屋簷下築巢，不知屋子將失火。"],
            ["鳳毛麟角","珍貴稀少人才。","凡夫俗子平凡。","比喻稀罕珍貴的人才或事物。"]
        ]
    };

    let lv = 1, score = 0, qIdx = 0, timeLeft = 10, timerId = null, quizSet = [], currentMax = 10;
    const app = document.getElementById('app');
    const lvMap = { 1: "執行特工", 2: "資深特派", 3: "王牌特攻", 4: "特級首席" };

    const iconSVG = {
        l1: `<svg class="lv-svg" viewBox="0 0 24 24"><path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z"/></svg>`,
        l2: `<svg class="lv-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2l2 8h8l-6 5 2 8-6-5-6 5 2-8-6-5h8z"/></svg>`,
        l3: `<svg class="lv-svg" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="4"/></svg>`,
        l4: `<svg class="lv-svg" viewBox="0 0 24 24"><path d="M12 2l2.4 7.2h7.6l-6 4.8 2.4 7.2-6-4.8-6 4.8 2.4-7.2-6-4.8h7.6z"/></svg>`
    };

    function showLobby() {
        if (timerId) clearInterval(timerId);
        app.innerHTML = `
            <div style="font-size:80px; margin-top:10px;">🦅</div>
            <div class="main-title">成語特工：航太終端</div>
            <div style="font-size:32px; color:var(--cyan); margin-bottom:30px;">請選擇職銜序列評定啟動：</div>
            <div class="level-grid">
                <div class="level-btn btn-l1" onclick="startTask(1)">${iconSVG.l1}<div class="lv-tag">${lvMap[1]}</div></div>
                <div class="level-btn btn-l2" onclick="startTask(2)">${iconSVG.l2}<div class="lv-tag">${lvMap[2]}</div></div>
                <div class="level-btn btn-l3" onclick="startTask(3)">${iconSVG.l3}<div class="lv-tag">${lvMap[3]}</div></div>
                <div class="level-btn btn-l4" onclick="startTask(4)">${iconSVG.l4}<div class="lv-tag">${lvMap[4]}</div></div>
            </div>
        `;
    }

    function startTask(n, fast = false) {
        initAudio();
        lv = n; score = 0; qIdx = 0; currentMax = fast ? 7 : 10;
        quizSet = [...quizData[n]].sort(() => Math.random() - 0.5).slice(0, 10);
        renderQuiz();
    }

    function renderQuiz() {
        if (qIdx >= quizSet.length) { finishTask(); return; }
        if (timerId) clearInterval(timerId);

        timeLeft = currentMax;
        let d = quizSet[qIdx];
        let options = [{t: d[1], c: true}, {t: d[2], c: false}].sort(() => Math.random() - 0.5);

        app.innerHTML = `
            <div style="width:100%; display:flex; justify-content:space-between; padding:0 30px; box-sizing:border-box;">
                <span style="font-size:32px; color:var(--cyan)">職銜：${lvMap[lv]}</span>
                <div class="timer-big" id="t">${timeLeft}</div>
                <span style="font-size:32px; color:var(--cyan)">進度：${qIdx+1}/10</span>
            </div>
            <div class="q-text">「${d[0]}」的意思是？</div>
            <button class="opt-btn" id="opt0" onclick="judge(0, ${options[0].c})">${options[0].t}</button>
            <button class="opt-btn" id="opt1" onclick="judge(1, ${options[1].c})">${options[1].t}</button>
            <div id="expl-area"></div>
        `;

        timerId = setInterval(() => {
            timeLeft--;
            const tEl = document.getElementById('t');
            if (tEl) {
                tEl.innerText = timeLeft;
                if (timeLeft <= 3) tEl.className = "timer-big timer-urgent";
            }
            if (timeLeft <= 0) { clearInterval(timerId); judge(-1, false, true); }
        }, 1000);
    }

    function judge(idx, isCorrect, isTimeout = false) {
        if (timerId) clearInterval(timerId);
        
        const d = quizSet[qIdx];
        const area = document.getElementById('expl-area');
        const b0 = document.getElementById('opt0'), b1 = document.getElementById('opt1');
        b0.onclick = null; b1.onclick = null;

        if (isCorrect && !isTimeout) {
            score += 100; SFX.ding();
            document.getElementById('opt' + idx).classList.add('opt-correct');
            area.innerHTML = `<div class="expl-panel expl-ok">⭐ 通訊正確：${d[3]}</div>`;
        } else {
            SFX.fail();
            if (!isTimeout) document.getElementById('opt' + idx).classList.add('opt-wrong');
            if (b0.innerText === d[1]) b0.classList.add('opt-correct');
            else b1.classList.add('opt-correct');

            const msg = isTimeout ? "⌛ 通訊逾時：計算失敗。" : "❌ 攔截警報：詳解如下";
            area.innerHTML = `<div class="expl-panel expl-fail">${msg}<br>${d[3]}</div>`;
            app.animate([{transform:'translateX(-25px)'},{transform:'translateX(25px)'},{transform:'translateX(0)'}], {duration:100, iterations:4});
        }

        qIdx++;
        setTimeout(renderQuiz, 3000);
    }

    function finishTask() {
        if (score >= 800) {
            SFX.win();
            let end = Date.now() + 4000;
            (function f() { confetti({ particleCount: 25, spread: 80, origin: { y: 0.6 }, colors:['#00f2ff','#ffd700'] }); if (Date.now() < end) requestAnimationFrame(f); })();
            app.innerHTML = `
                <div class="main-title" style="color:var(--gold)">評定成功！</div>
                <div class="score-hero">${score}</div>
                <div style="font-size:40px; margin-bottom:30px;">恭喜達成任務。具備「${lvMap[lv]}」素養。</div>
                <button class="opt-btn" style="width:60%; border-color:var(--gold); color:var(--gold)" onclick="startTask(lv, true)">⚡ 挑戰原職：加速版 (7秒)</button>
                <button class="opt-btn" style="width:60%" onclick="showLobby()">⭐ 返回基地晉升職銜</button>
            `;
        } else {
            SFX.fail();
            app.innerHTML = `<div class="main-title" style="color:var(--red)">任務評定失敗</div><div class="score-hero" style="color:var(--red)">${score}</div><button class="opt-btn" style="width:60%" onclick="showLobby()">重新受訓</button>`;
        }
    }
    showLobby();
</script>
</body>
</html>
