<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>成語特工：航太終端</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --cyan: #00f2ff; --purple: #bc13fe; --orange: #ff9d00; --gold: #ffd700; --red: #ff3131; --green: #39ff14; --bg: #020508; }
        
        body { 
            background-color: var(--bg); color: #fff; font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; 
            margin: 0; padding: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; 
            background: radial-gradient(circle at center, #0a192f 0%, #020508 100%); overflow-x: hidden;
        }

        /* 航太外框 - 使用彈性寬度 */
        .hud-border { 
            width: 95%; max-width: 800px; min-height: 90vh; border: 2px solid rgba(0, 242, 255, 0.3); border-radius: 20px; 
            position: relative; display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; 
            background: rgba(10, 25, 47, 0.6); backdrop-filter: blur(8px); margin: 10px auto;
        }

        .hud-border::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border: 2px solid var(--cyan); border-radius: 20px; pointer-events: none;
            clip-path: polygon(0 0, 15% 0, 15% 2%, 2% 2%, 2% 15%, 0 15%, 0 0, 85% 0, 85% 2%, 98% 2%, 98% 15%, 100% 15%, 100% 0, 100% 85%, 98% 85%, 98% 98%, 85% 98%, 85% 100%, 100% 100%, 0 100%, 0 85%, 2% 85%, 2% 98%, 15% 98%, 15% 100%, 0 100%);
            opacity: 0.8;
        }

        .main-title { 
            font-size: clamp(30px, 8vw, 60px); font-weight: 900; color: #fff; 
            text-shadow: 0 0 15px var(--cyan); margin: 10px 0; text-align: center; letter-spacing: 2px;
        }

        /* 響應式等級網格 */
        .level-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; margin-top: 20px; 
        }
        @media (max-width: 600px) { .level-grid { grid-template-columns: 1fr; } }

        .level-btn { 
            background: rgba(255,255,255,0.05); border: 2px solid #fff; border-radius: 12px; 
            min-height: 100px; display: flex; align-items: center; padding: 15px; cursor: pointer; transition: 0.3s;
        }
        .level-btn:hover { background: rgba(255,255,255,0.15); box-shadow: 0 0 20px currentColor; }
        
        .lv-svg { width: 40px; height: 40px; margin-right: 15px; stroke: currentColor; fill: none; stroke-width: 2; }
        .lv-tag { font-size: clamp(20px, 5vw, 32px); font-weight: 900; }

        .btn-l1 { border-color: var(--cyan); color: var(--cyan); }
        .btn-l2 { border-color: var(--purple); color: var(--purple); }
        .btn-l3 { border-color: var(--orange); color: var(--orange); }
        .btn-l4 { border-color: var(--gold); color: var(--gold); }

        /* 遊戲畫面縮放 */
        .timer-big { font-size: clamp(60px, 20vw, 120px); font-weight: 900; color: var(--cyan); line-height: 1; }
        .timer-urgent { color: var(--red) !important; animation: blink 0.5s infinite; }
        
        .q-text { font-size: clamp(24px, 6vw, 42px); font-weight: bold; margin: 20px 0; text-align: center; width: 90%; }
        
        .opt-btn { 
            width: 100%; padding: 18px; margin-bottom: 12px; font-size: clamp(18px, 5vw, 32px); 
            border-radius: 10px; border: 2px solid var(--cyan); background: rgba(0, 242, 255, 0.05); 
            color: #fff; cursor: pointer; font-weight: bold;
        }
        .opt-correct { background: var(--green) !important; color: #000; border-color: var(--green) !important; }
        .opt-wrong { background: var(--red) !important; color: #fff; border-color: var(--red) !important; animation: shake 0.4s; }

        .expl-panel { 
            width: 100%; font-size: clamp(16px, 4.5vw, 24px); padding: 15px; border-radius: 10px; 
            margin-top: 10px; border: 2px solid; background: rgba(0,0,0,0.8); box-sizing: border-box;
        }
        .expl-ok { border-color: var(--green); color: var(--green); }
        .expl-fail { border-color: var(--red); color: var(--red); }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .score-hero { font-size: clamp(80px, 30vw, 200px); color: var(--gold); font-weight: 900; line-height: 1; }
    </style>
</head>
<body>
    <div class="hud-border" id="app"></div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function synth(freq, type, duration, vol, delay=0) {
        setTimeout(() => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }, delay);
    }
    const SFX = {
        ding: () => { synth(1046, 'sine', 0.2, 0.3); synth(1318, 'sine', 0.2, 0.3, 80); synth(1567, 'sine', 0.3, 0.3, 160); },
        fail: () => { synth(233, 'sawtooth', 0.6, 0.4); synth(174, 'sawtooth', 0.8, 0.4, 250); },
        win: () => { [523, 659, 783, 1046, 1318].forEach((f, i) => synth(f, 'sine', 0.8, 0.1, i * 150)); }
    };

    const quizData = {
        1: [["三顧茅廬","誠心拜訪人才。","隨便觀察應付。","劉備三次拜訪諸葛亮，形容求才誠意。"],["半途而廢","中途停止努力。","堅持做到最後。","事情做一半就停止，形容意志不堅。"],["司空見慣","事物平凡常見。","想法奇怪離譜。","比喻事物經常見到，不足為奇。"],["完璧歸趙","物歸原主完好。","偷偷佔為己有。","藺相如將和氏璧完好帶回趙國。"],["手足之情","兄弟感情深厚。","路人偶然相遇。","比喻兄弟或好朋友之間親密的感情。"],["磨杵成針","努力必能成功。","做事拔苗助長。","只要努力不懈，連鐵棒都能磨成針。"],["精疲力竭","耗盡體力疲累。","精神飽滿振奮。","精神與體力都消耗殆盡。"],["滄海桑田","世事變化極大。","一直維持原狀。","大海變成了農田，形容世事變化極大。"],["東施效顰","胡亂模仿出醜。","表現青出於藍。","醜女模仿美女皺眉，反而更醜。"],["披荊斬棘","勇敢克服困難。","害怕畏縮不前。","撥開荊棘前進，比喻克服困難。"]],
        2: [["韜光養晦","收斂才華待機。","張揚顯露實力。","收斂光芒，不輕易顯露才華。"],["危如累卵","情況極度危險。","非常安全穩定。","危險得像堆疊起來的蛋，隨時會碎。"],["推心置腹","真心待人誠懇。","內心各懷鬼胎。","把心放在別人腹中，形容極為真誠。"],["博學多聞","學識廣博豐富。","孤陋廣聞淺薄。", "廣泛學習並聽取各種知識。"],["空中樓閣","脫離現實幻想。","做事腳踏實地。", "比喻脫離現實的幻想。"],["對牛彈琴","白費唇舌道理。","引導學生學習。", "比喻對不懂的人講道理。"],["心領神會","內心明白默契。","莫名其妙不懂。", "不必明說就能明白意思。"],["絕處逢生","死裡逃生轉機。","完全走投無路。", "在走投無路時發現生機。"],["侃侃而談","說話理直氣壯。","講話語無倫次。", "理直氣壯且從容的談話。"],["矯枉過正","糾正過度有害。","處理恰到好處。", "糾正錯誤超過限度。"]],
        3: [["邯鄲學步","模仿他人失我。","表現優秀勝師。","學走路最後爬著回家。"],["破釜沉舟","決心戰鬥到底。","做事苟且偷安。","表示必死的決心。"],["未雨綢繆","事先準備預防。","臨渴才要掘井。","天沒下雨先修房子。"],["洛陽紙貴","著作廣受歡迎。","書籍無人問津。","形容著作風行一時。"],["魚游釜中","生命極度危險。","處理游刃有餘。","魚在鍋中游。"],["斬釘截鐵","做事果斷利落。","態度猶豫不決。","態度堅決毫不猶豫。"],["草木皆兵","受驚驚恐萬分。","內心泰然自若。","把草木看成士兵。"],["捉襟見肘","生活極度窮困。","衣食無憂富裕。","形容窮於應付。"],["畫蛇添足","多此一舉失敗。","做得錦上添花。","形容多此一舉。"],["視若無睹","看見卻不理會。","認真觀察色彩。","像沒看到一樣不理。"]],
        4: [["越俎代庖","超越權限管事。","守好自己本分。","放下祭器去幫廚師。"],["罄竹難書","罪大惡極難盡。","功德無量巨大。","用盡竹簡也寫不完。"],["禍起蕭牆","禍亂生自內部。","一致對抗外敵。","比喻內部發生變亂。"],["井底之蛙","見識非常淺薄。","見多識廣博大。","比喻眼界狹小。"],["腹笥淵博","學問極度深厚。","胸無點墨無知。","形容極有學問。"],["削足適履","因小失大遷就。","量體裁衣合適。","比喻勉強遷就。"],["揠苗助長","勉強反而有害。","遵循自然生長。","拔高禾苗反而弄死。"],["驚弓之鳥","受過驚嚇敏感。","處變不驚冷靜。","聽到弦聲就害怕。"],["燕雀處堂","處險境而不覺。","安穩高枕無憂。","不知屋子將失火。"],["鳳毛麟角","珍貴稀少人才。","凡夫俗子平凡。","稀罕珍貴的人才。"]]
    };

    let lv = 1, score = 0, qIdx = 0, timeLeft = 10, timerId = null, quizSet = [], currentMax = 10;
    const app = document.getElementById('app');
    const lvMap = { 1: "執行特工", 2: "資深特派", 3: "王牌特攻", 4: "特級首席" };

    function showLobby() {
        if (timerId) clearInterval(timerId);
        app.innerHTML = `
            <div style="font-size:50px;">🦅</div>
            <div class="main-title">成語特工：航太終端</div>
            <div style="font-size:18px; color:var(--cyan); margin-bottom:10px;">職銜評定啟動</div>
            <div class="level-grid">
                <div class="level-btn btn-l1" onclick="startTask(1)"><svg class="lv-svg" viewBox="0 0 24 24"><path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z"/></svg><div class="lv-tag">${lvMap[1]}</div></div>
                <div class="level-btn btn-l2" onclick="startTask(2)"><svg class="lv-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2l2 8h8l-6 5 2 8-6-5-6 5 2-8-6-5h8z"/></svg><div class="lv-tag">${lvMap[2]}</div></div>
                <div class="level-btn btn-l3" onclick="startTask(3)"><svg class="lv-svg" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="4"/></svg><div class="lv-tag">${lvMap[3]}</div></div>
                <div class="level-btn btn-l4" onclick="startTask(4)"><svg class="lv-svg" viewBox="0 0 24 24"><path d="M12 2l2.4 7.2h7.6l-6 4.8 2.4 7.2-6-4.8-6 4.8 2.4-7.2-6-4.8h7.6z"/></svg><div class="lv-tag">${lvMap[4]}</div></div>
            </div>
        `;
    }

    function startTask(n, fast = false) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        lv = n; score = 0; qIdx = 0; currentMax = fast ? 7 : 10;
        quizSet = [...quizData[n]].sort(() => Math.random() - 0.5).slice(0, 10);
        renderQuiz();
    }

    function renderQuiz() {
        if (qIdx >= quizSet.length) { finishTask(); return; }
        if (timerId) clearInterval(timerId);
        timeLeft = currentMax;
        let d = quizSet[qIdx];
        let options = [{t: d[1], c: true}, {t: d[2], c: false}].sort(() => Math.random() - 0.5);

        app.innerHTML = `
            <div style="width:100%; display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:16px; color:var(--cyan)">${lvMap[lv]}</span>
                <div class="timer-big" id="t">${timeLeft}</div>
                <span style="font-size:16px; color:var(--cyan)">${qIdx+1}/10</span>
            </div>
            <div class="q-text">「${d[0]}」是什麼意思？</div>
            <button class="opt-btn" id="opt0" onclick="judge(0, ${options[0].c})">${options[0].t}</button>
            <button class="opt-btn" id="opt1" onclick="judge(1, ${options[1].c})">${options[1].t}</button>
            <div id="expl-area"></div>
        `;

        timerId = setInterval(() => {
            timeLeft--;
            const tEl = document.getElementById('t');
            if (tEl) {
                tEl.innerText = timeLeft;
                if (timeLeft <= 3) tEl.className = "timer-big timer-urgent";
            }
            if (timeLeft <= 0) { clearInterval(timerId); judge(-1, false, true); }
        }, 1000);
    }

    function judge(idx, isCorrect, isTimeout = false) {
        if (timerId) clearInterval(timerId);
        const d = quizSet[qIdx];
        const area = document.getElementById('expl-area');
        const b0 = document.getElementById('opt0'), b1 = document.getElementById('opt1');
        b0.onclick = null; b1.onclick = null;

        if (isCorrect && !isTimeout) {
            score += 100; SFX.ding();
            document.getElementById('opt' + idx).classList.add('opt-correct');
            area.innerHTML = `<div class="expl-panel expl-ok">⭐ 正確：${d[3]}</div>`;
        } else {
            SFX.fail();
            if (!isTimeout) document.getElementById('opt' + idx).classList.add('opt-wrong');
            if (b0.innerText === d[1]) b0.classList.add('opt-correct');
            else b1.classList.add('opt-correct');
            const msg = isTimeout ? "⌛ 逾時判定失敗" : "❌ 攔截警報";
            area.innerHTML = `<div class="expl-panel expl-fail">${msg}<br>${d[3]}</div>`;
        }
        qIdx++;
        setTimeout(renderQuiz, 3000);
    }

    function finishTask() {
        if (score >= 800) {
            SFX.win();
            app.innerHTML = `
                <div class="main-title" style="color:var(--gold)">評定成功！</div>
                <div class="score-hero">${score}</div>
                <button class="opt-btn" style="border-color:var(--gold); color:var(--gold)" onclick="startTask(lv, true)">⚡ 原職加速 (7秒)</button>
                <button class="opt-btn" onclick="showLobby()">⭐ 返回基地</button>
            `;
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        } else {
            SFX.fail();
            app.innerHTML = `<div class="main-title" style="color:var(--red)">任務失敗</div><div class="score-hero" style="color:var(--red)">${score}</div><button class="opt-btn" onclick="showLobby()">重新受訓</button>`;
        }
    }
    showLobby();
</script>
</body>
</html>
