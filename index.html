<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特工挑戰任務</title>
    <style>
        /* 全域樣式：字體全面放大，背景深色特工風格 */
        body {
            background-color: #1a1f26;
            color: #ffffff;
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 遊戲主容器：加上閃爍邊框 */
        .game-container {
            width: 90%;
            max-width: 800px;
            background: #252d3a;
            border: 5px solid #00f2ff;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
        }

        /* 標題字體加大 */
        #status-title {
            font-size: 64px; /* 極大標題 */
            color: #00f2ff;
            margin-bottom: 30px;
            font-weight: bold;
        }

        /* 分數與成語詳解區域 */
        .content-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            border-left: 10px solid #ffd700;
            margin-bottom: 40px;
            text-align: left;
        }

        .score-text {
            font-size: 48px; /* 分數加大 */
            color: #ffd700;
            margin: 20px 0;
            text-align: center;
        }

        .info-text {
            font-size: 32px; /* 詳解文字加大 */
            line-height: 1.6;
            margin: 10px 0;
        }

        /* 按鈕樣式：超級明顯的大黃鈕 */
        .action-btn {
            background-color: #ffeb3b;
            color: #000;
            font-size: 36px; /* 按鈕字體加大 */
            padding: 20px 60px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .action-btn:hover {
            transform: scale(1.1);
            background-color: #fff176;
        }

        /* 晉級成功特效 */
        .glow-animation {
            animation: glow 1s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #ffd700; }
            to { text-shadow: 0 0 20px #fff, 0 0 30px #ffea00, 0 0 40px #ffea00; }
        }
    </style>
</head>
<body>

<div class="game-container" id="game-ui">
    <div id="status-title">任務完成</div>
    
    <div class="content-box">
        <div class="score-text" id="final-score-display">最終得分：800</div>
        <div class="info-text" id="sub-message">🎉 恭喜！你已達到特工標準！</div>
    </div>

    <button class="action-btn" id="main-btn" onclick="handleButtonClick()">重新挑戰</button>
</div>

<audio id="victory-audio" src="https://actions.google.com/sounds/v1/science_fiction/deep_space.ogg"></audio>

<script>
    // 模擬當前得分 (實際應用中由您的遊戲邏輯傳入)
    let currentScore = 850; 
    let currentLevel = 1;

    function initEndScreen() {
        const title = document.getElementById("status-title");
        const scoreDisp = document.getElementById("final-score-display");
        const msg = document.getElementById("sub-message");
        const btn = document.getElementById("main-btn");
        const audio = document.getElementById("victory-audio");

        scoreDisp.innerText = "最終得分：" + currentScore;

        if (currentScore >= 800) {
            // --- 方案 A：達標晉級邏輯 ---
            title.innerText = "菁英特工 晉升成功！";
            title.classList.add("glow-animation");
            msg.innerText = "🚀 總部已分派更難的任務，準備好接受挑戰了嗎？";
            btn.innerText = "執行下一項任務";
            
            // 播放震撼音效 (這裡暫用長音效替代，您可換成您的 mp3)
            audio.play(); 
        } else {
            // 未達標邏輯
            title.innerText = "任務結束";
            msg.innerText = "尚未達到特工標準，請再次訓練！";
            btn.innerText = "重新挑戰";
        }
    }

    function handleButtonClick() {
        if (currentScore >= 800) {
            alert("正在進入下一關：難度增加 20%！");
            // 這裡放進入第二關的程式碼
            location.reload(); // 暫時以重新整理模擬
        } else {
            location.reload();
        }
    }

    // 頁面載入後自動執行
    window.onload = initEndScreen;
</script>

</body>
</html>
