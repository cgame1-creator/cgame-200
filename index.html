    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function synth(freq, type, duration, vol, delay=0) {
        if(!audioCtx) return;
        setTimeout(() => {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }, delay);
    }
    const SFX = {
        ding: () => { synth(1100, 'sine', 0.15, 0.3); synth(1400, 'sine', 0.15, 0.3, 60); },
        alarm: () => { synth(110, 'sawtooth', 0.5, 0.4); synth(110, 'sawtooth', 0.4, 0.3, 150); },
        win: () => { [523, 659, 783, 1046].forEach((f, i) => synth(f, 'sine', 0.8, 0.1, i * 150)); }
    };

    function showLobby() {
        if(timer) clearInterval(timer);
        isLocked = false; qIdx = 0; score = 0;
        document.getElementById('app').innerHTML = `
            <div class="main-title">成語特工：絕對終端</div>
            <div style="color:var(--cyan); font-size:24px; margin-bottom:20px;">目標：800分 解鎖「7秒極限挑戰」</div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; width:85%;">
                ${[1,2,3,4].map(n => `<button class="final-btn" onclick="initAudio(); launch(${n}, 10)">${lvMap[n]}<br><small style="font-size:20px; color:var(--gold)">10s 測試模式</small></button>`).join('')}
            </div>
        `;
    }

    function launch(n, speed) {
        initAudio(); curLv = n; score = 0; qIdx = 0; isLocked = false; errorList = []; gameSpeed = speed;
        let pool = [...DB[n]];
        qSet = pool.sort(() => Math.random() - 0.5).slice(0, 10);
        renderNext();
    }

    function renderNext() {
        if (qIdx >= qSet.length) { renderFinal(); return; }
        isLocked = false; if(timer) clearInterval(timer);
        let timeLeft = gameSpeed, d = qSet[qIdx];
        let opts = [{t: d[1], c: true}, {t: d[2], c: false}].sort(() => Math.random() - 0.5);
        document.getElementById('app').innerHTML = `
            <div style="width:100%; display:flex; justify-content:space-between; padding:0 40px; align-items:center;">
                <span style="font-size:28px; color:var(--cyan)">模式: ${gameSpeed}s</span>
                <span id="t_val" style="font-size:110px; font-weight:900; color:var(--gold)">${timeLeft}</span>
                <span style="font-size:28px; color:var(--cyan)">進度: ${qIdx+1}/10</span>
            </div>
            <div class="q-text">「${d[0]}」意思？</div>
            <button class="opt-btn" id="b0" onclick="hit(0, ${opts[0].c})">${opts[0].t}</button>
            <button class="opt-btn" id="b1" onclick="hit(1, ${opts[1].c})">${opts[1].t}</button>
            <div id="expl_area" style="height:150px"></div>
        `;
        timer = setInterval(() => {
            timeLeft--;
            if(document.getElementById('t_val')) document.getElementById('t_val').innerText = timeLeft;
            if(timeLeft <= 0) hit(-1, false);
        }, 1000);
    }

    function hit(i, ok) {
        if (isLocked) return; isLocked = true; clearInterval(timer);
        const d = qSet[qIdx];
        if (ok) { score += 100; SFX.ding(); if(i!==-1) document.getElementById('b' + i).classList.add('opt-correct'); } 
        else { SFX.alarm(); errorList.push(d); if(i!==-1) document.getElementById('b' + i).classList.add('opt-wrong'); }
        document.getElementById('expl_area').innerHTML = `<div class="expl-container"><div class="expl-status" style="color:${ok? 'var(--green)':'var(--red)'}">${ok?'⭐ 成功':'✘ 失敗'}</div><div class="expl-text">${d[3]}</div></div>`;
        qIdx++; setTimeout(renderNext, 3000);
    }

    function toggleModal(show) { document.getElementById('modal').style.display = show ? 'flex' : 'none'; }

    function renderFinal() {
        SFX.win(); confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
        let canAdvance = score >= 800;
        let reportHTML = errorList.map(e => `<div class="error-item"><b style="color:var(--gold); font-size:36px;">${e[0]}</b>：${e[1]}<br><span style="color:#fff; font-size:26px;">詳解：${e[3]}</span></div>`).join('');
        document.getElementById('error_report_content').innerHTML = errorList.length ? reportHTML : "<h2 style='color:var(--green); font-size:40px;'>完美達成任務！無錯題。</h2>";
        
        document.getElementById('app').innerHTML = `
            <div class="main-title">任務報告</div>
            <div style="font-size:130px; color:var(--gold); font-weight:900; margin:10px 0; text-shadow: 0 0 50px var(--gold);">SCORE: ${score}</div>
            
            <button class="opt-btn" style="width:65%; border-color:var(--orange); color:var(--orange); border-width:5px;" onclick="toggleModal(true)">詳細錯題解說紀錄</button>

            <div class="final-btn-group">
                ${(canAdvance && gameSpeed === 10) ? `<button class="final-btn btn-purple" onclick="launch(${curLv}, 7)">挑戰 7秒<br>極限模式</button>` : ""}
                <button class="final-btn" onclick="launch(${curLv}, 10)">再次<br>測試</button>
                <button class="final-btn" onclick="showLobby()">回到<br>總部</button>
            </div>
            ${(canAdvance && gameSpeed === 10) ? `<div style="color:var(--green); font-size:32px; margin-top:15px; font-weight:bold; animation:blink 1s infinite;">解鎖成功：您可以挑戰該等級的 7秒 極限模式了！</div>` : ""}
        `;
    }
    showLobby();
</script></body></html>
